name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # 0.9.0: stealth gate — a tagged release must NOT ship if the Runtime.enable
  # leak / stealth posture has regressed. Runs the same probes as CI but blocks
  # the build/publish, not just a PR.
  stealth-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install system deps (Xvfb + Chrome runtime)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq xvfb libnss3 libatk-bridge2.0-0 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libxss1 libasound2t64 || sudo apt-get install -yq libasound2
      - name: Install vibatchium + extras
        run: |
          python -m pip install -U pip
          pip install -e ".[all]"
          pip install pytest pytest-asyncio pytest-timeout
      - name: Install patchright Chrome
        run: |
          patchright install chrome
          patchright install-deps chrome || true
      - name: Run stealth gate
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          xvfb-run -a -s "-screen 0 1920x1080x24" python -m pytest \
            tests/test_stealth_drift_gate.py tests/test_wave7_stealth_gate.py \
            -v --tb=short --timeout=120

  build:
    needs: stealth-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # The version is dynamic — hatch reads it from vibatchium/__init__.py
          # ([tool.hatch.version]), so that file is the source of truth, NOT a
          # static `version = "..."` line in pyproject (which no longer exists;
          # grepping for it returned empty and failed every tagged build).
          pyver=$(grep -E '^__version__' vibatchium/__init__.py | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$pyver" ]; then
            echo "::error::Git tag v$tag does not match vibatchium/__init__.py __version__ $pyver"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
