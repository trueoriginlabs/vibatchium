[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "patchium"
version = "0.1.0"
description = "Patchwright stealth + Vibium-style LLM-friendly CLI for agentic browser automation."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "ClavIclar" }]
keywords = ["browser", "automation", "ai", "agent", "patchright", "stealth", "playwright", "mcp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Topic :: Internet :: WWW/HTTP :: Browsers",
]
dependencies = [
    "patchright>=1.59.0",
    "click>=8.1.7",
    "mcp>=1.0.0",
]

[project.scripts]
patchium = "patchium.cli:main"

[project.urls]
Homepage = "https://github.com/ClavIclar/patchium"
Issues = "https://github.com/ClavIclar/patchium/issues"

[tool.hatch.build.targets.wheel]
packages = ["patchium"]

[tool.hatch.envs.default]
dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
